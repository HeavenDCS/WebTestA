<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <link id="main-css" rel="stylesheet" href="style.css">
    <script>
        // Force refresh CSS to avoid caching issues
        document.getElementById('main-css').href = 'style.css?v=' + new Date().getTime();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="custom-cursor"></div>
    <div id="cursor-trail"></div>

    <div class="ambient-background"></div>
    
    <div class="main-container">
        
        <!-- Step 1: The Button -->
        <div id="intro-section" class="sequence-section active">
            <button id="start-btn" class="modern-btn">
                <svg class="play-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 5V19L19 12L8 5Z" fill="currentColor"/>
                </svg>
                <span>For You</span>
            </button>
        </div>

        <!-- Step 2: The Love Letter (Typing Effect) -->
        <div id="letter-section" class="sequence-section">
            <div class="letter-content">
                <p id="typed-greeting"></p>
                <p id="typed-body"></p>
                <p id="typed-signature" class="signature"></p>
            </div>
        </div>

        <!-- Step 3: The Verses -->
        <div id="verses-section" class="sequence-section">
            <div class="verse-container">
                <p id="verse-text" class="verse-text"></p>
                <p id="verse-ref" class="verse-ref"></p>
            </div>
        </div>

        <!-- Secret Message -->
        <div id="secret-message" class="sequence-section">
            <div class="letter-content secret-content">
                <p>You found my secret.</p>
                <p>Even when the verses end and the music fades, my love for you never will. You are my forever and always. I promise to choose you, every single day.</p>
                <p class="signature">- Always.</p>
            </div>
        </div>

    </div>

    <!-- Time Counter -->
    <div id="time-counter" class="time-counter">
        <p>I have loved you for</p>
        <div class="time-display">
            <span id="days">00</span>d : 
            <span id="hours">00</span>h : 
            <span id="minutes">00</span>m : 
            <span id="seconds">00</span>s
        </div>
    </div>

    <!-- Secret Star -->
    <div id="secret-star" class="secret-star">✨</div>

    <!-- Audio Visualizer Canvas -->
    <canvas id="visualizer"></canvas>

    <!-- The Song -->
    <audio id="love-song" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
